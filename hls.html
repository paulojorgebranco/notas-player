<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>Notas — HLS Player</title>
    <style>
      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        color: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      video {
        display: block;
        width: 100%;
        height: 100%;
        background: #000;
        object-fit: contain;
      }

      .message {
        display: flex;
        width: 100%;
        min-height: 200px;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #b6b6b6;
        font-size: 14px;
        line-height: 1.5;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="message" class="message">A preparar o stream HLS…</div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"></script>
    <script>
      (() => {
        const message = document.getElementById("message");
        const source = new URLSearchParams(window.location.search).get("src") || "";

        function validSource(value) {
          try {
            const url = new URL(value);
            return url.protocol === "https:" && /\.m3u8$/i.test(url.pathname);
          } catch (error) {
            return false;
          }
        }

        function showError(text) {
          const currentVideo = document.querySelector("video");
          if (currentVideo) currentVideo.replaceWith(message);
          message.textContent = text;
        }

        if (!validSource(source)) {
          showError("Endereço HLS .m3u8 inválido.");
          return;
        }

        const video = document.createElement("video");
        video.controls = true;
        video.autoplay = false;
        video.playsInline = true;
        video.preload = "metadata";
        video.setAttribute("aria-label", "Leitor HLS");
        message.replaceWith(video);

        if (window.Hls && window.Hls.isSupported()) {
          const hls = new window.Hls({ enableWorker: true, lowLatencyMode: true });
          hls.loadSource(source);
          hls.attachMedia(video);
          hls.on(window.Hls.Events.ERROR, (_event, data) => {
            if (!data.fatal) return;
            if (data.type === window.Hls.ErrorTypes.MEDIA_ERROR) {
              hls.recoverMediaError();
              return;
            }
            hls.destroy();
            showError("Não foi possível carregar este stream HLS. O endereço pode ter expirado ou o servidor pode estar a bloquear o leitor.");
          });
          return;
        }

        if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = source;
          return;
        }

        showError("A reprodução HLS não é suportada neste sistema.");
      })();
    </script>
  </body>
</html>
