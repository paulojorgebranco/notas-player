<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <title>Notas — Video Player</title>
    <style>
      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      body {
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        color: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      iframe,
      video,
      #youtube-player {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }

      .message {
        display: flex;
        width: 100%;
        min-height: 200px;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #b6b6b6;
        font-size: 14px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="message" class="message">A preparar o vídeo…</div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"></script>
    <script>
      (() => {
        const parameters = new URLSearchParams(window.location.search);
        const videoId = parameters.get("v") || "";
        const hlsValue = parameters.get("hls") || "";
        const requestedStart = Number.parseInt(parameters.get("start") || "0", 10);
        const start = Number.isFinite(requestedStart) && requestedStart > 0 ? requestedStart : 0;
        const validVideoId = /^[A-Za-z0-9_-]{11}$/.test(videoId);
        const message = document.getElementById("message");

        function validHlsUrl(value) {
          try {
            const url = new URL(value);
            return url.protocol === "https:" && /\.m3u8$/i.test(url.pathname);
          } catch (error) {
            return false;
          }
        }

        function showHlsPlayer(url) {
          const video = document.createElement("video");
          video.controls = true;
          video.autoplay = false;
          video.playsInline = true;
          video.preload = "metadata";
          video.setAttribute("aria-label", "Vídeo HLS");
          message.replaceWith(video);

          if (window.Hls && window.Hls.isSupported()) {
            const hls = new window.Hls({ enableWorker: true, lowLatencyMode: true });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(window.Hls.Events.ERROR, (_event, data) => {
              if (!data.fatal) return;
              if (data.type === window.Hls.ErrorTypes.MEDIA_ERROR) {
                hls.recoverMediaError();
                return;
              }
              hls.destroy();
              video.replaceWith(message);
              message.textContent = "Não foi possível reproduzir este stream HLS. Confirma o endereço, a validade do link e as permissões CORS.";
            });
            return;
          }

          if (video.canPlayType("application/vnd.apple.mpegurl")) {
            video.src = url;
            return;
          }

          video.replaceWith(message);
          message.textContent = "Este navegador não suporta reprodução HLS.";
        }

        if (hlsValue) {
          if (!validHlsUrl(hlsValue)) {
            message.textContent = "Link .m3u8 inválido. Usa um endereço HTTPS.";
            return;
          }
          showHlsPlayer(hlsValue);
          return;
        }

        if (!validVideoId) {
          message.textContent = "Link de vídeo inválido.";
          return;
        }

        const mount = document.createElement("div");
        mount.id = "youtube-player";
        message.replaceWith(mount);

        function createYoutubePlayer() {
          const player = new window.YT.Player("youtube-player", {
            width: "100%",
            height: "100%",
            videoId,
            playerVars: {
              playsinline: 1,
              rel: 0,
              start,
              origin: window.location.origin,
              widget_referrer: window.location.href,
            },
            events: {
              onReady: (event) => {
                event.target.setVolume(1);
                window.setTimeout(() => event.target.setVolume(1), 500);
              },
              onStateChange: (event) => {
                if (event.data === window.YT.PlayerState.PLAYING) event.target.setVolume(1);
              },
            },
          });
          return player;
        }

        if (window.YT && window.YT.Player) {
          createYoutubePlayer();
        } else {
          window.onYouTubeIframeAPIReady = createYoutubePlayer;
          const api = document.createElement("script");
          api.src = "https://www.youtube.com/iframe_api";
          document.head.appendChild(api);
        }
      })();
    </script>
  </body>
</html>
